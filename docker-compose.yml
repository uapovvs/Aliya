services:
  postgres:
    image: postgres:16-alpine
    container_name: dmaic_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dmaic_db}
      POSTGRES_USER: ${DB_USER:-dmaic_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dmaic_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dmaic_user} -d ${DB_NAME:-dmaic_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dmaic_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
